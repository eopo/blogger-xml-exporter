repos:
  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run
        language: system
        types: [go]
        pass_filenames: false
        stages: [commit, push, manual]

      - id: gofmt
        name: gofmt
        entry: bash -c 'gofmt -w "$@" && git add -A' --
        language: system
        types: [go]

      - id: go-test
        name: go test
        entry: bash -c 'go test ./...'
        language: system
        types: [go]
        pass_filenames: false
        stages: [push]

      - id: go-vet
        name: go vet
        entry: bash -c 'go vet ./...'
        language: system
        types: [go]
        pass_filenames: false
