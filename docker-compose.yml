services:
  blogger-xml-exporter:
    build: .
    ports:
      - "8080:8080"
    environment:
      - BLOGGER_API_KEY=${BLOGGER_API_KEY}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./templates:/app/templates:ro
      # Optional: nur nötig, wenn config.yaml assets.dir auf "/app/assets"
      # setzt und ein eigenes Favicon/Logo bereitgestellt werden soll.
      # - ./assets:/app/assets:ro
