root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ."
  bin = "./tmp/main"
  include_ext = ["go", "yaml", "yml", "html", "tmpl", "tpl"]
  exclude_dir = ["tmp", "web/static"]
  delay = 200

[log]
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"
