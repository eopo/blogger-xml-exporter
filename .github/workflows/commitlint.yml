name: Commitlint

on:
  pull_request:
    branches: [main]

jobs:
  commitlint:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.json
