name: Security

on:
  push:
    branches: [main]
  schedule:
    # Daily security scans at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # ============================================================================
  # DEPENDENCY SCANNING (Dependabot alternative)
  # ============================================================================

  check-go-deps:
    name: Check Go Dependencies for Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: backend/go.mod
          work-dir: backend
          cache-dependency-path: backend/go.sum

  check-npm-deps:
    name: Check Node Dependencies for Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

  # ============================================================================
  # CODE QUALITY SCANNING
  # ============================================================================

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['go', 'javascript-typescript']
    steps:
      - uses: actions/checkout@v7

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - uses: github/codeql-action/autobuild@v4

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  # ============================================================================
  # DEPENDENCY LICENSE CHECK
  # ============================================================================

  check-licenses:
    name: Check Dependency Licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Check Go licenses
        working-directory: backend
        run: |
          go install github.com/google/go-licenses@latest
          cp ../LICENSE LICENSE
          go-licenses check ./...
        continue-on-error: true

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Check Node licenses
        working-directory: frontend
        run: |
          npm ci
          npm ls --depth=0 2>/dev/null | grep -E '(MIT|Apache-2.0|ISC|BSD)' || echo "License check complete"
        continue-on-error: true
