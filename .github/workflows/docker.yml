name: Docker Build & Push

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. 1.2.3)"
        required: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  # Gate: Scan Dockerfile for misconfigurations BEFORE building or publishing anything.
  # App-level CVEs (Go, npm) are gated separately in CI via govulncheck and npm audit.
  # Ongoing container CVE monitoring after publish is handled by GitHub Dependabot (GHCR).
  scan-dockerfile:
    name: Scan Dockerfile for Misconfigurations
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || format('v{0}', inputs.tag) }}

      - name: Scan Dockerfile for misconfigurations
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          exit-code: 1
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-dockerfile.sarif

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-dockerfile.sarif
          category: trivy-dockerfile

  build-and-push:
    name: Build & Push Docker Image
    needs: [scan-dockerfile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || format('v{0}', inputs.tag) }}

      - name: Resolve version
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name || format('v{0}', inputs.tag) }}"
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "semver=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.version.outputs.semver }}
            COMMIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.release.published_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
