name: CI (Reusable)

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: read

jobs:
  files-changed:
    uses: ./.github/workflows/files-changed.yml

  lint-backend:
    name: Lint Backend (Go)
    needs: files-changed
    if: needs.files-changed.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - uses: golangci/golangci-lint-action@v9
        with:
          working-directory: backend
          version-file: .golangci-lint-version
          args: --timeout 5m

  test-backend:
    name: Test Backend (Go)
    needs: files-changed
    if: needs.files-changed.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Run tests
        run: cd backend && go test -v -race -coverprofile=coverage.out ./...

      - uses: codecov/codecov-action@v7
        with:
          files: ./backend/coverage.out
          flags: go-backend
          fail_ci_if_error: false

  frontend:
    name: Frontend (Lint + Test + Build)
    needs: files-changed
    if: needs.files-changed.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Type check
        run: cd frontend && npm run type-check

      - name: Tests
        run: cd frontend && npm run test -- --run

      - name: Build
        run: cd frontend && npm run build

      - name: Verify build artifacts
        run: |
          [ -f web/static/index.html ] || (echo "index.html missing" && exit 1)
          [ -f web/static/css/style.css ] || (echo "style.css missing" && exit 1)
          [ -f web/static/js/app.js ] || (echo "app.js missing" && exit 1)

  ci-complete:
    name: "✓ CI Complete"
    if: always()
    needs: [lint-backend, test-backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed or were skipped
        run: |
          echo '${{ toJSON(needs) }}'
          echo '${{ toJSON(needs) }}' | jq -e '
            to_entries |
            map(select(.value.result != "success" and .value.result != "skipped")) |
            length == 0
          ' || (echo "One or more CI checks failed" && exit 1)
