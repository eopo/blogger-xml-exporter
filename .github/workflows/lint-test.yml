name: Lint & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-go:
    name: Lint Go Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - uses: golangci/golangci-lint-action@v5
        with:
          version: v2.12.2
          args: --timeout=5m

  test-go:
    name: Test Go Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Run tests with coverage
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov
          fail_ci_if_error: false

  build-image:
    name: Build Docker Image
    needs: [lint-go, test-go]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Download Tailwind CLI
        run: |
          mkdir -p tools
          curl -sL https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-macos-arm64 -o tools/tailwindcss || \
          curl -sL https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64 -o tools/tailwindcss
          chmod +x tools/tailwindcss

      - name: Build CSS
        run: |
          if [ -f tools/tailwindcss ]; then \
            tools/tailwindcss -i web/tailwind.src.css -o web/static/css/style.css --minify; \
          else \
            echo "Tailwind CLI not available for this platform"; \
          fi
        continue-on-error: true

      - name: Build Docker image (dry-run)
        run: docker build -t blogger-xml-exporter:latest .
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Download Tailwind CSS
        run: |
          mkdir -p web/static/css
          curl -sL https://github.com/tailwindlabs/tailwindcss/releases/download/v4.0.0-alpha.1/tailwindcss-linux-x64 \
            -o /tmp/tailwindcss && chmod +x /tmp/tailwindcss
          /tmp/tailwindcss -i web/tailwind.src.css -o web/static/css/style.css

      - name: Build image (dry run)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
