name: Check (Lint & Test)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ============================================================================
  # LINTING JOBS (parallel, independent)
  # ============================================================================

  lint-backend:
    name: Lint Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Cache golangci-lint
        uses: actions/cache@v4
        with:
          path: ~/.cache/golangci-lint
          key: golangci-lint-${{ runner.os }}-v2.12.2
          restore-keys: golangci-lint-${{ runner.os }}-

      - uses: golangci/golangci-lint-action@v9
        with:
          working-directory: backend
          args: --timeout 5m
          version-file: .golangci-lint-version
          skip-cache: false  # Use configured cache

  lint-frontend:
    name: Lint Frontend (Vue/TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-npm
        with:
          path: frontend/node_modules
          key: npm-${{ runner.os }}-22-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-22-

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -w frontend

      - name: Check TypeScript types
        run: npm run type-check -w frontend

  # ============================================================================
  # TESTING JOBS (depend on lint jobs)
  # ============================================================================

  test-backend:
    name: Test Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Cache test cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: go-test-${{ runner.os }}-${{ hashFiles('backend/go.sum') }}
          restore-keys: go-test-${{ runner.os }}-

      - name: Run backend tests with coverage
        run: cd backend && go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./backend/coverage.out
          flags: go-backend
          name: go-coverage
          fail_ci_if_error: false

  build-frontend:
    name: Build & Verify Frontend (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-npm
        with:
          path: frontend/node_modules
          key: npm-${{ runner.os }}-22-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-22-

      - name: Install dependencies
        run: npm ci

      - name: Cache Vite build
        uses: actions/cache@v4
        with:
          path: frontend/dist
          key: vite-build-${{ runner.os }}-${{ github.sha }}
          restore-keys: vite-build-${{ runner.os }}-

      - name: Build production bundle
        run: npm run build -w frontend

      - name: Verify build artifacts exist
        run: |
          [ -f web/static/index.html ] && echo "✓ index.html" || (echo "✗ index.html missing" && exit 1)
          [ -f web/static/css/style.css ] && echo "✓ style.css" || (echo "✗ style.css missing" && exit 1)
          [ -f web/static/js/app.js ] && echo "✓ app.js" || (echo "✗ app.js missing" && exit 1)

  # ============================================================================
  # GATE: All checks must pass before build workflow
  # ============================================================================

  check-complete:
    name: ✓ All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend, test-backend, build-frontend]
    if: always()
    steps:
      - name: Fail if any check failed
        if: needs.lint-backend.result != 'success' || needs.lint-frontend.result != 'success' || needs.test-backend.result != 'success' || needs.build-frontend.result != 'success'
        run: exit 1
      - name: ✓ All checks passed
        run: echo "All checks passed successfully!"
