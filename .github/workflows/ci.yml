name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}

jobs:
  lint:
    name: Lint Go Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  test:
    name: Test Go Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Run tests with coverage
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov
          fail_ci_if_error: false

  build:
    name: Build image
    needs: [lint, test]
    # Validate on PRs/main; build + push a single multi-arch manifest on tags.
    if: >-
      github.event_name == 'pull_request' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read # fetch the repository content
      packages: write # push the image and build cache to GHCR
      id-token: write # sign SLSA provenance and cache entries via OIDC
    # Docker-maintained reusable workflow: native per-arch runners (no QEMU),
    # then a single multi-arch manifest. Pinned to a commit SHA (Dependabot
    # keeps it current). The image is pushed only on release tags.
    uses: docker/github-builder/.github/workflows/build.yml@c4a1b216d96a8c85b45a9974b37857828274c808 # v1.13.0
    with:
      output: image
      push: ${{ startsWith(github.ref, 'refs/tags/') }}
      # Maximal efficiency: PR/main only validate amd64 (fast, native); the full
      # multi-arch image is built natively in parallel only on release tags.
      # Safe because the Dockerfile has no architecture-specific logic.
      platforms: ${{ startsWith(github.ref, 'refs/tags/') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
      cache: true
      cache-mode: max
      meta-images: ghcr.io/${{ github.repository }}
      meta-tags: |
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=semver,pattern={{major}}
        type=raw,value=latest,enable={{is_default_branch}}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
