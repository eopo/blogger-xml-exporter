name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ============================================================================
  # LINTING JOBS (parallel, fast)
  # ============================================================================

  lint-backend:
    name: Lint Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: backend/go.mod
          cache: true

      - uses: golangci/golangci-lint-action@v9.3.0
        with:
          working-directory: backend
          args: --timeout 5m

  lint-frontend:
    name: Lint Frontend (Node.js/Vue)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Run ESLint
        run: npm run lint --prefix frontend

      - name: Check TypeScript types
        run: npm run type-check --prefix frontend

  # ============================================================================
  # TESTING JOBS (depend on lint jobs, run after validation)
  # ============================================================================

  test-backend:
    name: Test Backend (Go)
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: backend/go.mod
          cache: true

      - name: Run backend tests with coverage
        run: cd backend && go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7.0.0
        with:
          files: ./backend/coverage.out
          flags: go-backend
          name: go-coverage
          fail_ci_if_error: false

  build-frontend:
    name: Build Frontend (Vite)
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6.4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Build production bundle
        run: npm run build --prefix frontend

      - name: Verify build artifacts
        run: |
          [ -f web/static/index.html ] && echo "✓ index.html" || exit 1
          [ -f web/static/css/style.css ] && echo "✓ style.css" || exit 1
          [ -f web/static/js/app.js ] && echo "✓ app.js" || exit 1

  # ============================================================================
  # BUILD JOB (depends on all tests passing)
  # ============================================================================

  build-docker:
    name: Build Docker Image
    needs: [test-backend, build-frontend]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: docker/github-builder/.github/workflows/build.yml@c4a1b216d96a8c85b45a9974b37857828274c808 # v1.13.0
    with:
      output: image
      push: ${{ startsWith(github.ref, 'refs/tags/') }}
      platforms: ${{ startsWith(github.ref, 'refs/tags/') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
      cache: true
      cache-mode: max
      meta-images: ghcr.io/${{ github.repository }}
      meta-tags: |
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=semver,pattern={{major}}
        type=raw,value=latest,enable={{is_default_branch}}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
